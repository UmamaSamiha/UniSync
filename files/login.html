<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSync — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal-50:  #effcf9; --teal-100: #d0f7ef; --teal-200: #a3efe0;
            --teal-300: #6de0cc; --teal-400: #3fc9b4; --teal-500: #22ab99;
            --teal-600: #178a7e; --teal-700: #166f67;
            --blue-100: #ddedfb; --blue-200: #c2dff8; --blue-500: #3f8fe3;
            --slate-400: #94a5b0; --slate-500: #73858f; --slate-600: #5e6f78;
            --slate-700: #4d5b63; --slate-800: #3a464d; --slate-900: #1e2a30;
            --bg: #f2faf8; --card: #ffffff; --border: var(--teal-200);
            --shadow: 0 8px 40px rgba(22,74,70,0.12);
            --radius: 16px; --radius-sm: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--slate-900);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; position: relative; overflow: hidden;
        }

        .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; pointer-events: none; z-index: 0; }
        .bg-1 { width: 500px; height: 500px; background: var(--teal-200); top: -160px; right: -120px; }
        .bg-2 { width: 400px; height: 400px; background: var(--blue-200); bottom: -100px; left: -100px; }

        .card {
            position: relative; z-index: 1;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 44px 40px;
            box-shadow: var(--shadow); width: 100%; max-width: 420px;
            animation: rise 0.4s ease;
        }
        @keyframes rise { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* Logo */
        .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
        .logo-icon { color: var(--teal-500); }
        .logo h1 {
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.8rem;
            background: linear-gradient(135deg, var(--teal-600), var(--blue-500));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .tagline { text-align: center; font-size: 0.85rem; color: var(--slate-500); margin-bottom: 28px; }

        /* Tabs */
        .tabs { display: flex; background: var(--teal-50); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 28px; }
        .tab-btn {
            flex: 1; padding: 9px; border: none; background: transparent;
            font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
            color: var(--slate-500); border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: #fff; color: var(--teal-700); box-shadow: 0 2px 8px rgba(22,74,70,0.1); }

        /* Form */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--slate-700); margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid var(--teal-200); border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--slate-900);
            background: #fafffe; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus { border-color: var(--teal-400); box-shadow: 0 0 0 3px rgba(34,171,153,0.12); }

        .btn-submit {
            width: 100%; padding: 12px; margin-top: 4px;
            background: linear-gradient(135deg, var(--teal-500), var(--blue-500));
            color: white; border: none; border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 14px rgba(34,171,153,0.3);
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(34,171,153,0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Alert */
        .alert {
            padding: 10px 14px; border-radius: var(--radius-sm);
            font-size: 0.84rem; font-weight: 500; margin-bottom: 16px; display: none;
        }
        .alert.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert.success { background: var(--teal-50); color: var(--teal-700); border: 1px solid var(--teal-200); }
        .alert.show { display: block; }

        /* Default hint */
        .hint {
            margin-top: 20px; padding: 12px 14px;
            background: var(--teal-50); border: 1px solid var(--teal-100);
            border-radius: var(--radius-sm); font-size: 0.78rem; color: var(--slate-600);
            line-height: 1.6;
        }
        .hint strong { color: var(--teal-700); }

        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-shape bg-1"></div>
    <div class="bg-shape bg-2"></div>

    <div class="card">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
                    <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="2"/>
                    <path d="M9 14.5L12.5 18L19 11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>UniSync</h1>
        </div>
        <p class="tagline">Study Task Manager · Umama Samiha</p>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Log In</button>
            <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div class="form-panel active" id="loginPanel">
            <div class="alert" id="loginAlert"></div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" value="umamasamiha@gmail.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" value="12345678">
            </div>
            <button class="btn-submit" id="loginBtn" onclick="doLogin()">Log In</button>
            <div class="hint">
                <strong>Default account:</strong><br>
                Email: umamasamiha@gmail.com<br>
                Password: 12345678
            </div>
        </div>

        <!-- Sign Up Form -->
        <div class="form-panel" id="signupPanel">
            <div class="alert" id="signupAlert"></div>
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input class="form-input" type="text" id="signupName" placeholder="e.g. Umama Samiha">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password <span style="color:var(--slate-400);font-weight:400">(min 6 characters)</span></label>
                <input class="form-input" type="password" id="signupPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input class="form-input" type="password" id="signupConfirm" placeholder="••••••••">
            </div>
            <button class="btn-submit" id="signupBtn" onclick="doSignup()">Create Account</button>
        </div>
    </div>

    <script>
        const API = "backend.php";

        // Redirect if already logged in
        if (localStorage.getItem("unisync_user")) {
            window.location.href = "frontend.html";
        }

        function switchTab(tab) {
            document.querySelectorAll(".tab-btn").forEach((b, i) => {
                b.classList.toggle("active", (tab === "login" && i === 0) || (tab === "signup" && i === 1));
            });
            document.getElementById("loginPanel").classList.toggle("active",  tab === "login");
            document.getElementById("signupPanel").classList.toggle("active", tab === "signup");
        }

        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = "alert " + type + " show";
        }
        function hideAlert(id) {
            document.getElementById(id).className = "alert";
        }

        async function doLogin() {
            hideAlert("loginAlert");
            const email    = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            if (!email || !password) { showAlert("loginAlert", "Please fill in all fields.", "error"); return; }

            const btn = document.getElementById("loginBtn");
            btn.disabled = true; btn.textContent = "Logging in…";

            try {
                const res  = await fetch(API + "?action=login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const json = await res.json();
                if (json.status === "success") {
                    localStorage.setItem("unisync_user", JSON.stringify(json.user));
                    window.location.href = "frontend.html";
                } else {
                    showAlert("loginAlert", json.message, "error");
                    btn.disabled = false; btn.textContent = "Log In";
                }
            } catch (e) {
                showAlert("loginAlert", "Server error. Make sure Apache & MySQL are running.", "error");
                btn.disabled = false; btn.textContent = "Log In";
            }
        }

        async function doSignup() {
            hideAlert("signupAlert");
            const name     = document.getElementById("signupName").value.trim();
            const email    = document.getElementById("signupEmail").value.trim();
            const password = document.getElementById("signupPassword").value;
            const confirm  = document.getElementById("signupConfirm").value;

            if (!name || !email || !password || !confirm) { showAlert("signupAlert", "Please fill in all fields.", "error"); return; }
            if (password !== confirm) { showAlert("signupAlert", "Passwords do not match.", "error"); return; }
            if (password.length < 6)  { showAlert("signupAlert", "Password must be at least 6 characters.", "error"); return; }

            const btn = document.getElementById("signupBtn");
            btn.disabled = true; btn.textContent = "Creating account…";

            try {
                const res  = await fetch(API + "?action=signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });
                const json = await res.json();
                if (json.status === "success") {
                    showAlert("signupAlert", json.message + " Redirecting to login…", "success");
                    setTimeout(() => switchTab("login"), 1800);
                } else {
                    showAlert("signupAlert", json.message, "error");
                }
            } catch (e) {
                showAlert("signupAlert", "Server error. Try again.", "error");
            }
            btn.disabled = false; btn.textContent = "Create Account";
        }

        // Allow Enter key to submit
        document.addEventListener("keydown", e => {
            if (e.key !== "Enter") return;
            const loginActive = document.getElementById("loginPanel").classList.contains("active");
            if (loginActive) doLogin(); else doSignup();
        });
    </script>
</body>
</html>
